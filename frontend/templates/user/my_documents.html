{% extends 'base.html' %}
{% block title %}Мои документы{% endblock %}
{% block content %}
<h1>Мои документы</h1>

<div id="documents-container">
  <div class="table-container" style="margin-top: 20px;">
    <table>
      <thead>
        <tr>
          <th>Шаблон</th>
          <th>Формат</th>
          <th>Дата создания</th>
          <th>Скачать</th>
        </tr>
      </thead>
      <tbody id="documents-tbody">
        <tr id="loading-row">
          <td colspan="4" style="text-align:center;">Загрузка...</td>
        </tr>
      </tbody>
    </table>
  </div>
  <p id="empty-msg" style="text-align:center; display:none;">Нет заполненных документов</p>
</div>

<script>
async function loadDocuments() {
  const tbody = document.getElementById('documents-tbody');
  const empty = document.getElementById('empty-msg');

  try {
    const res = await apiRequest('/api/documents/');
    const data = await res.json();
    const docs = data.data || data;

    tbody.innerHTML = '';

    if (docs.length === 0) {
      empty.style.display = 'block';
      return;
    }

    docs.forEach(doc => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${escapeHtml(doc.template_title)}</td>
        <td>${doc.output_format?.toUpperCase()}</td>
        <td>${new Date(doc.created_at).toLocaleDateString('ru-RU', {
          day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
        })}</td>
        <td><a href="${doc.output_file}" class="btn btn-primary btn-sm" download>Скачать</a></td>
      `;
      tbody.appendChild(tr);
    });
  } catch (e) {
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color: var(--red);">Ошибка загрузки</td></tr>';
  }
}

// Простой экранировщик (уже есть в main.js, но продублируем для независимости)
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text || '';
  return div.innerHTML;
}

document.addEventListener('DOMContentLoaded', loadDocuments);
</script>
{% endblock %}
