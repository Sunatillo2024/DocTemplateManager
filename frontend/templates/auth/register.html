{% extends 'base.html' %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<div class="auth-form">
  <h2>Регистрация</h2>
  <form id="register-form" onsubmit="handleRegister(event)">
    <div class="form-group">
      <label for="username">Имя пользователя</label>
      <input type="text" id="username" name="username" placeholder="Имя пользователя" required>
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Введите email" required>
    </div>
    <div class="form-group">
      <label for="password">Пароль</label>
      <input type="password" id="password" name="password" placeholder="Минимум 8 символов" required minlength="8">
    </div>
    <div class="form-group">
      <label for="password2">Подтверждение пароля</label>
      <input type="password" id="password2" name="password2" placeholder="Повторите пароль" required>
    </div>
    <button type="submit" class="btn btn-primary" id="reg-btn">Зарегистрироваться</button>
    <p class="auth-link">Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a></p>
  </form>
</div>

<script>
async function handleRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('reg-btn');
  btn.disabled = true;
  btn.innerHTML = 'Отправка... <span class="spinner"></span>';

  const username = document.getElementById('username').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const password2 = document.getElementById('password2').value;

  if (password !== password2) {
    showToast('Пароли не совпадают', 'error');
    btn.disabled = false;
    btn.textContent = 'Зарегистрироваться';
    return;
  }

  try {
    const res = await apiRequest('/api/auth/register/', {
      method: 'POST',
      body: JSON.stringify({ username, email, password, password2 })
    });
    const data = await res.json();
    if (data.success) {
      showToast('Регистрация успешна!', 'success');
      if (data.data.token) {
        localStorage.setItem('auth_token', data.data.token);
      }
      window.location.href = '/';
    }
  } catch(err) {
    // ошибка показана
  } finally {
    btn.disabled = false;
    btn.textContent = 'Зарегистрироваться';
  }
}
</script>

<style>
/* те же стили, что и в login */
.auth-form {
  max-width: 400px;
  margin: 60px auto;
  background: var(--white);
  padding: 40px;
  border-radius: var(--radius);
  box-shadow: var(--shadow-md);
}
.auth-form h2 {
  margin-bottom: 20px;
  text-align: center;
}
.auth-link {
  text-align: center;
  margin-top: 15px;
}
</style>
{% endblock %}
