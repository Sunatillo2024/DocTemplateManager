{% extends 'base.html' %}
{% block title %}Управление шаблонами{% endblock %}
{% block content %}
<h1>Управление шаблонами</h1>

<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
  <a href="{% url 'admin-template-create' %}" class="btn btn-accent">+ Загрузить новый</a>
</div>

<div class="table-container">
  <table>
    <thead>
      <tr>
        <th>Название</th>
        <th>Загрузил</th>
        <th>Дата</th>
        <th>Плейсхолдеров</th>
        <th>Активен</th>
        <th>Действия</th>
      </tr>
    </thead>
    <tbody id="templates-tbody">
      <tr><td colspan="6" style="text-align:center;">Загрузка...</td></tr>
    </tbody>
  </table>
</div>

<!-- Модальное окно подтверждения удаления -->
<div class="modal-overlay" id="delete-modal" style="display:none;">
  <div class="modal">
    <h3>Подтверждение</h3>
    <p>Вы уверены, что хотите деактивировать этот шаблон? <br><strong id="delete-title"></strong></p>
    <div class="modal-actions">
      <button class="btn btn-outline" id="modal-cancel">Отмена</button>
      <button class="btn btn-danger" id="modal-confirm">Деактивировать</button>
    </div>
  </div>
</div>

<script>
let deleteTemplateId = null;

// Загрузка таблицы шаблонов
async function loadTemplates() {
  const tbody = document.getElementById('templates-tbody');
  try {
    const res = await apiRequest('/api/admin/templates/');
    const data = await res.json();
    const templates = data.data || data;

    tbody.innerHTML = '';
    if (templates.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Нет шаблонов</td></tr>';
      return;
    }

    templates.forEach(tpl => {
      const tr = document.createElement('tr');
      const created = new Date(tpl.created_at).toLocaleDateString('ru-RU');
      tr.innerHTML = `
        <td><strong>${escapeHtml(tpl.title)}</strong></td>
        <td>${escapeHtml(tpl.uploaded_by || '—')}</td>
        <td>${created}</td>
        <td>${tpl.placeholder_count ?? tpl.placeholders?.length ?? 0}</td>
        <td>${tpl.is_active ? '✅ Да' : '❌ Нет'}</td>
        <td>
          <a href="/admin/templates/${tpl.id}/edit/" class="btn btn-outline btn-sm">✏️</a>
          <button class="btn btn-danger btn-sm" onclick="openDeleteModal('${tpl.id}', '${escapeHtml(tpl.title).replace(/'/g, "\\'")}')">🗑️</button>
        </td>
      `;
      tbody.appendChild(tr);
    });
  } catch (e) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--red);">Ошибка загрузки</td></tr>';
  }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text || '';
  return div.innerHTML;
}

// Модальное окно
function openDeleteModal(id, title) {
  deleteTemplateId = id;
  document.getElementById('delete-title').textContent = title;
  document.getElementById('delete-modal').style.display = 'flex';
}

document.getElementById('modal-cancel').addEventListener('click', () => {
  document.getElementById('delete-modal').style.display = 'none';
  deleteTemplateId = null;
});

document.getElementById('modal-confirm').addEventListener('click', async () => {
  if (!deleteTemplateId) return;
  try {
    await apiRequest(`/api/admin/templates/${deleteTemplateId}/`, { method: 'DELETE' });
    showToast('Шаблон деактивирован', 'success');
    loadTemplates();
  } catch (e) {
    // ошибка показана в apiRequest
  } finally {
    document.getElementById('delete-modal').style.display = 'none';
    deleteTemplateId = null;
  }
});

document.addEventListener('DOMContentLoaded', loadTemplates);
</script>
{% endblock %}
