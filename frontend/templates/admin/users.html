{% extends 'base.html' %}
{% block title %}Управление пользователями{% endblock %}
{% block content %}
<h1>Пользователи</h1>

<div class="table-container" style="margin-top: 20px;">
  <table>
    <thead>
      <tr>
        <th>Имя пользователя</th>
        <th>Email</th>
        <th>Роль</th>
        <th>Дата регистрации</th>
        <th>Действия</th>
      </tr>
    </thead>
    <tbody id="users-tbody">
      <tr><td colspan="5" style="text-align:center;">Загрузка...</td></tr>
    </tbody>
  </table>
</div>

<!-- Модальное окно подтверждения удаления -->
<div class="modal-overlay" id="delete-modal" style="display:none;">
  <div class="modal">
    <h3>Подтверждение</h3>
    <p>Вы уверены, что хотите удалить пользователя? <br><strong id="delete-username"></strong></p>
    <div class="modal-actions">
      <button class="btn btn-outline" id="modal-cancel">Отмена</button>
      <button class="btn btn-danger" id="modal-confirm">Удалить</button>
    </div>
  </div>
</div>

<script>
let deleteUserId = null;

// Загрузка пользователей
async function loadUsers() {
  const tbody = document.getElementById('users-tbody');
  try {
    const res = await apiRequest('/api/admin/users/');
    const data = await res.json();
    const users = data.data || data;

    tbody.innerHTML = '';
    if (users.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Нет пользователей</td></tr>';
      return;
    }

    users.forEach(u => {
      const tr = document.createElement('tr');
      const joined = new Date(u.created_at).toLocaleDateString('ru-RU');
      const roleClass = u.role === 'admin' ? 'color: var(--primary); font-weight:600;' : '';
      tr.innerHTML = `
        <td>${escapeHtml(u.username)}</td>
        <td>${escapeHtml(u.email)}</td>
        <td>
          <select onchange="changeRole('${u.id}', this.value)" style="width:auto; padding:4px 8px;">
            <option value="user" ${u.role === 'user' ? 'selected' : ''}>User</option>
            <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Admin</option>
          </select>
        </td>
        <td>${joined}</td>
        <td>
          <button class="btn btn-danger btn-sm" onclick="openDeleteModal('${u.id}', '${escapeHtml(u.username).replace(/'/g, "\\'")}')">🗑️</button>
        </td>
      `;
      tbody.appendChild(tr);
    });
  } catch (e) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--red);">Ошибка загрузки</td></tr>';
  }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text || '';
  return div.innerHTML;
}

// Изменение роли
async function changeRole(userId, newRole) {
  try {
    await apiRequest(`/api/admin/users/${userId}/`, {
      method: 'PUT',
      body: JSON.stringify({ role: newRole })
    });
    showToast('Роль обновлена', 'success');
  } catch (e) {
    loadUsers(); // перезагрузить таблицу, если ошибка
  }
}

// Модальное окно
function openDeleteModal(id, username) {
  deleteUserId = id;
  document.getElementById('delete-username').textContent = username;
  document.getElementById('delete-modal').style.display = 'flex';
}

document.getElementById('modal-cancel').addEventListener('click', () => {
  document.getElementById('delete-modal').style.display = 'none';
  deleteUserId = null;
});

document.getElementById('modal-confirm').addEventListener('click', async () => {
  if (!deleteUserId) return;
  try {
    await apiRequest(`/api/admin/users/${deleteUserId}/`, { method: 'DELETE' });
    showToast('Пользователь удалён', 'success');
    loadUsers();
  } catch (e) {
    // ошибка показана
  } finally {
    document.getElementById('delete-modal').style.display = 'none';
    deleteUserId = null;
  }
});

document.addEventListener('DOMContentLoaded', loadUsers);
</script>
{% endblock %}
