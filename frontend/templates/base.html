<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Шаблоны документов{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="{% url 'dashboard' %}" class="logo">DocTemplate</a>
            <div class="nav-links">
                {% if user.is_authenticated %}
                    <a href="{% url 'dashboard' %}">Главная</a>
                    <a href="{% url 'my-documents' %}">Мои документы</a>
                    {% if user.role == 'admin' %}
                        <a href="{% url 'admin-dashboard' %}">Админ-панель</a>
                    {% endif %}
                    <a href="#" onclick="logout()">Выйти</a>
                {% else %}
                    <a href="{% url 'login' %}">Войти</a>
                    <a href="{% url 'register' %}">Регистрация</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>© 2025 DocTemplate Manager</p>
    </footer>
    <script src="{% static 'js/main.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
